<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <line x1="0" y1="100" x2="600" y2="100" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#ffffff08" stroke-width="1"/>

  <!-- Budget card -->
  <rect x="30" y="30" width="250" height="90" rx="16" fill="url(#card1)" filter="url(#shadow)" opacity="0.95"/>
  <text x="50" y="60" fill="white" font-family="Arial" font-size="12" opacity="0.8">Monthly Budget</text>
  <text x="50" y="88" fill="white" font-family="Arial" font-size="24" font-weight="bold">₱ 15,000</text>
  <rect x="50" y="100" width="200" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="50" y="100" width="130" height="6" rx="3" fill="white" opacity="0.9"/>

  <!-- Spent card -->
  <rect x="300" y="30" width="120" height="90" rx="14" fill="#1e293b" filter="url(#shadow)" stroke="#6366f133" stroke-width="1"/>
  <text x="318" y="60" fill="#94a3b8" font-family="Arial" font-size="11">Spent</text>
  <text x="318" y="85" fill="#6366f1" font-family="Arial" font-size="20" font-weight="bold">₱8,650</text>
  <text x="318" y="108" fill="#10b981" font-family="Arial" font-size="11">▼ 12%</text>

  <!-- Remaining card -->
  <rect x="438" y="30" width="130" height="90" rx="14" fill="#1e293b" filter="url(#shadow)" stroke="#10b98133" stroke-width="1"/>
  <text x="456" y="60" fill="#94a3b8" font-family="Arial" font-size="11">Remaining</text>
  <text x="456" y="85" fill="#10b981" font-family="Arial" font-size="20" font-weight="bold">₱6,350</text>
  <text x="456" y="108" fill="#6366f1" font-family="Arial" font-size="11">42% left</text>

  <!-- Bar chart -->
  <rect x="30" y="145" width="250" height="220" rx="16" fill="#1e293b" filter="url(#shadow)" stroke="#ffffff08" stroke-width="1"/>
  <text x="50" y="172" fill="white" font-family="Arial" font-size="13" font-weight="bold">6-Month Trend</text>
  <rect x="55"  y="275" width="22" height="70"  rx="5" fill="url(#bar1)" opacity="0.7"/>
  <rect x="90"  y="255" width="22" height="90"  rx="5" fill="url(#bar1)" opacity="0.8"/>
  <rect x="125" y="240" width="22" height="105" rx="5" fill="url(#bar1)" opacity="0.9"/>
  <rect x="160" y="260" width="22" height="85"  rx="5" fill="url(#bar1)" opacity="0.85"/>
  <rect x="195" y="230" width="22" height="115" rx="5" fill="url(#bar1)"/>
  <rect x="230" y="250" width="22" height="95"  rx="5" fill="url(#bar2)"/>
  <text x="58"  y="360" fill="#64748b" font-family="Arial" font-size="9">Oct</text>
  <text x="93"  y="360" fill="#64748b" font-family="Arial" font-size="9">Nov</text>
  <text x="128" y="360" fill="#64748b" font-family="Arial" font-size="9">Dec</text>
  <text x="163" y="360" fill="#64748b" font-family="Arial" font-size="9">Jan</text>
  <text x="198" y="360" fill="#64748b" font-family="Arial" font-size="9">Feb</text>
  <text x="233" y="360" fill="#10b981" font-family="Arial" font-size="9">Mar</text>

  <!-- Donut chart -->
  <rect x="300" y="145" width="270" height="220" rx="16" fill="#1e293b" filter="url(#shadow)" stroke="#ffffff08" stroke-width="1"/>
  <text x="320" y="172" fill="white" font-family="Arial" font-size="13" font-weight="bold">Categories</text>
  <circle cx="390" cy="260" r="55" fill="none" stroke="#6366f1" stroke-width="22" stroke-dasharray="104 243" stroke-dashoffset="0" opacity="0.9"/>
  <circle cx="390" cy="260" r="55" fill="none" stroke="#10b981" stroke-width="22" stroke-dasharray="76 243" stroke-dashoffset="-104" opacity="0.9"/>
  <circle cx="390" cy="260" r="55" fill="none" stroke="#f59e0b" stroke-width="22" stroke-dasharray="50 243" stroke-dashoffset="-180" opacity="0.9"/>
  <circle cx="390" cy="260" r="55" fill="none" stroke="#ec4899" stroke-width="22" stroke-dasharray="13 243" stroke-dashoffset="-230" opacity="0.9"/>
  <circle cx="390" cy="260" r="44" fill="#1e293b"/>
  <text x="390" y="255" fill="white" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">₱8,650</text>
  <text x="390" y="272" fill="#64748b" font-family="Arial" font-size="9" text-anchor="middle">total spent</text>
  <circle cx="465" cy="215" r="5" fill="#6366f1"/>
  <text x="475" y="219" fill="#94a3b8" font-family="Arial" font-size="10">Food 43%</text>
  <circle cx="465" cy="235" r="5" fill="#10b981"/>
  <text x="475" y="239" fill="#94a3b8" font-family="Arial" font-size="10">Transport 31%</text>
  <circle cx="465" cy="255" r="5" fill="#f59e0b"/>
  <text x="475" y="259" fill="#94a3b8" font-family="Arial" font-size="10">Shopping 21%</text>
  <circle cx="465" cy="275" r="5" fill="#ec4899"/>
  <text x="475" y="279" fill="#94a3b8" font-family="Arial" font-size="10">Other 5%</text>
</svg>