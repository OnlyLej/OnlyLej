<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <linearGradient id="ball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="cursor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <line x1="0" y1="0" x2="600" y2="400" stroke="#ffffff04" stroke-width="1"/>
  <line x1="600" y1="0" x2="0" y2="400" stroke="#ffffff04" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff04" stroke-width="1"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#ffffff04" stroke-width="1"/>

  <circle cx="300" cy="200" r="200" fill="none" stroke="#ffffff04" stroke-width="1"/>
  <circle cx="300" cy="200" r="140" fill="none" stroke="#ffffff05" stroke-width="1"/>
  <circle cx="300" cy="200" r="80"  fill="none" stroke="#ffffff06" stroke-width="1"/>

  <circle cx="420" cy="140" r="28" fill="url(#ball)" filter="url(#glow1)" opacity="0.95"/>
  <circle cx="420" cy="134" r="8" fill="white" opacity="0.25"/>

  <circle cx="415" cy="135" r="38" fill="none" stroke="#f472b630" stroke-width="1.5"/>
  <circle cx="415" cy="135" r="52" fill="none" stroke="#f472b615" stroke-width="1"/>

  <polygon points="370,185 378,178 386,185" fill="url(#cursor)" filter="url(#glow2)" opacity="0.9"/>
  <line x1="374" y1="184" x2="380" y2="196" stroke="url(#cursor)" stroke-width="2.5" stroke-linecap="round"/>

  <line x1="386" y1="185" x2="415" y2="158" stroke="#38bdf840" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="30" y="30" width="110" height="50" rx="12" fill="#0f172a" filter="url(#shadow)" stroke="#6366f130" stroke-width="1"/>
  <text x="50" y="52" fill="#94a3b8" font-family="Arial" font-size="10">Score</text>
  <text x="50" y="70" fill="white" font-family="Arial" font-size="18" font-weight="bold">247</text>

  <rect x="460" y="30" width="110" height="50" rx="12" fill="#0f172a" filter="url(#shadow)" stroke="#f472b630" stroke-width="1"/>
  <text x="480" y="52" fill="#94a3b8" font-family="Arial" font-size="10">Best</text>
  <text x="480" y="70" fill="#f472b6" font-family="Arial" font-size="18" font-weight="bold">389</text>

  <rect x="170" y="30" width="260" height="50" rx="12" fill="#0f172a" filter="url(#shadow)" stroke="#ffffff08" stroke-width="1"/>
  <text x="300" y="52" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">Time Left</text>
  <text x="300" y="70" fill="white" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">00:42</text>

  <rect x="30" y="320" width="540" height="50" rx="12" fill="#0f172a" filter="url(#shadow)" stroke="#ffffff06" stroke-width="1"/>
  <text x="300" y="342" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">Difficulty</text>
  <rect x="80" y="350" width="100" height="6" rx="3" fill="#6366f1" opacity="0.9"/>
  <rect x="190" y="350" width="100" height="6" rx="3" fill="#6366f1" opacity="0.6"/>
  <rect x="300" y="350" width="100" height="6" rx="3" fill="#6366f1" opacity="0.3"/>
  <rect x="410" y="350" width="100" height="6" rx="3" fill="#1e293b"/>
  <text x="80"  y="368" fill="#6366f1" font-family="Arial" font-size="9">Easy</text>
  <text x="225" y="368" fill="#6366f1" font-family="Arial" font-size="9" text-anchor="middle">Medium</text>
  <text x="355" y="368" fill="#64748b" font-family="Arial" font-size="9" text-anchor="middle">Hard</text>
  <text x="460" y="368" fill="#64748b" font-family="Arial" font-size="9" text-anchor="middle">Insane</text>

  <circle cx="180" cy="280" r="10" fill="url(#ball)" opacity="0.3"/>
  <circle cx="80"  cy="240" r="7"  fill="url(#ball)" opacity="0.2"/>
  <circle cx="500" cy="300" r="8"  fill="url(#ball)" opacity="0.2"/>
  <circle cx="540" cy="180" r="5"  fill="url(#ball)" opacity="0.15"/>

  <text x="300" y="220" fill="white" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" opacity="0.06">CATCH</text>
  <text x="300" y="255" fill="white" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" opacity="0.06">THE BALL</text>
</svg>