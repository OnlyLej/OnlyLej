<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1f2d"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <circle cx="300" cy="200" r="180" fill="none" stroke="#10b98108" stroke-width="60"/>
  <circle cx="300" cy="200" r="120" fill="none" stroke="#10b98110" stroke-width="40"/>
  <circle cx="300" cy="200" r="60"  fill="none" stroke="#10b98118" stroke-width="20"/>

  <rect x="30" y="30" width="260" height="150" rx="16" fill="url(#card)" filter="url(#shadow)" stroke="#10b98130" stroke-width="1"/>
  <text x="50" y="60" fill="#10b981" font-family="Arial" font-size="11" font-weight="700" letter-spacing="2">RFID ATTENDANCE</text>
  <line x1="50" y1="70" x2="270" y2="70" stroke="#10b98130" stroke-width="1"/>
  <text x="50" y="95" fill="#94a3b8" font-family="Arial" font-size="11">Today</text>
  <text x="50" y="115" fill="white" font-family="Arial" font-size="22" font-weight="bold">42 Present</text>
  <text x="50" y="138" fill="#64748b" font-family="Arial" font-size="11">out of 50 students</text>
  <rect x="50" y="152" width="220" height="6" rx="3" fill="#1e293b"/>
  <rect x="50" y="152" width="185" height="6" rx="3" fill="url(#green)" opacity="0.9"/>

  <rect x="310" y="30" width="130" height="68" rx="14" fill="url(#card)" filter="url(#shadow)" stroke="#10b98130" stroke-width="1"/>
  <text x="328" y="56" fill="#94a3b8" font-family="Arial" font-size="11">On Time</text>
  <text x="328" y="80" fill="#10b981" font-family="Arial" font-size="20" font-weight="bold">38</text>

  <rect x="458" y="30" width="112" height="68" rx="14" fill="url(#card)" filter="url(#shadow)" stroke="#f59e0b30" stroke-width="1"/>
  <text x="474" y="56" fill="#94a3b8" font-family="Arial" font-size="11">Late</text>
  <text x="474" y="80" fill="#f59e0b" font-family="Arial" font-size="20" font-weight="bold">4</text>

  <rect x="310" y="112" width="260" height="68" rx="14" fill="url(#card)" filter="url(#shadow)" stroke="#6366f130" stroke-width="1"/>
