  <text x="328" y="162" fill="#f87171" font-family="Arial" font-size="20" font-weight="bold">8 students</text>

  <rect x="30" y="200" width="540" height="170" rx="16" fill="url(#card)" filter="url(#shadow)" stroke="#ffffff08" stroke-width="1"/>
  <text x="50" y="228" fill="white" font-family="Arial" font-size="13" font-weight="bold">Recent Scans</text>
