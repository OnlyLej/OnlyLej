  <text x="66" y="363" fill="#10b981" font-family="Arial" font-size="9" text-anchor="middle">IN</text>
  <text x="88" y="357" fill="white" font-family="Arial" font-size="11" font-weight="600">Carlos Reyes</text>
  <text x="88" y="371" fill="#64748b" font-family="Arial" font-size="10">BSCS 3-A  •  07:58 AM</text>
  <text x="510" y="364" fill="#10b981" font-family="Arial" font-size="10" font-weight="700">Present</text>
