  <text x="88" y="275" fill="#64748b" font-family="Arial" font-size="10">BSCS 3-A  •  08:02 AM</text>
  <text x="510" y="268" fill="#10b981" font-family="Arial" font-size="10" font-weight="700">Present</text>

  <rect x="50" y="288" width="500" height="1" fill="#ffffff08"/>

  <circle cx="66" cy="311" r="10" fill="#f59e0b20" stroke="#f59e0b50" stroke-width="1"/>
  <text x="66" y="315" fill="#f59e0b" font-family="Arial" font-size="8" text-anchor="middle">IN</text>
  <text x="88" y="309" fill="white" font-family="Arial" font-size="11" font-weight="600">Maria Santos</text>
  <text x="88" y="323" fill="#64748b" font-family="Arial" font-size="10">BSCS 3-A  •  08:17 AM</text>
  <text x="510" y="316" fill="#f59e0b" font-family="Arial" font-size="10" font-weight="700">Late</text>

